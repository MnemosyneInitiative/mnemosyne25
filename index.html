<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mnemosyne Initiative</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #05060a, #000000);
      color: #c9d1d9;
      font-family: "Courier New", monospace;
      overflow: hidden;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #ffd700, #ffed4e);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 5px;
    }

    h1 {
      letter-spacing: 6px;
      font-size: 2.5rem;
      color: #ffd700;
      margin-top: 0;
    }

    .subtitle {
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .terminal {
      border: 1px solid #2a2a2a;
      padding: 20px;
      width: 320px;
      background: rgba(0,0,0,0.6);
    }

    input {
      width: 100%;
      padding: 10px;
      background: black;
      border: 1px solid #333;
      color: #ffd700;
      outline: none;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      color: #ffd700;
      cursor: pointer;
      box-sizing: border-box;
    }

    button:hover {
      background: #111;
    }

    .log {
      margin-top: 15px;
      font-size: 0.85rem;
      opacity: 0.8;
      min-height: 40px;
      color: #ffd700;
    }

    .glitch {
      animation: glitch 1.2s infinite;
    }

    @keyframes glitch {
      0% { opacity: 1; }
      20% { opacity: 0.7; }
      40% { opacity: 1; }
      60% { opacity: 0.4; }
      80% { opacity: 1; }
      100% { opacity: 0.9; }
    }

    .footer {
      position: absolute;
      bottom: 10px;
      font-size: 0.7rem;
      opacity: 0.4;
    }

    .logo-upload {
      margin-bottom: 20px;
    }

    .logo-upload input[type="file"] {
      display: none;
    }

    .logo-upload label {
      font-size: 0.8rem;
      opacity: 0.6;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo-upload">
      <label for="logoFile">Charger un logo</label>
      <input type="file" id="logoFile" accept="image/*" />
    </div>

    <div class="logo" id="logoContainer">
      <span id="defaultLogo">🧠</span>
      <img id="logoImg" style="display: none;" />
    </div>

    <h1 class="glitch">MNEMOSYNE INITIATIVE</h1>

    <div class="terminal">
      <input id="mail" type="text" placeholder="enter contact signal..." />
      <button onclick="fakeSend()">TRANSMIT</button>
      <div class="log" id="log"></div>
    </div>
  </div>

  <div class="footer">
    // "Memory is not storage. It is control."
  </div>

  <script>
    // Gestion du logo personnalisé
    const logoFile = document.getElementById("logoFile");
    const logoImg = document.getElementById("logoImg");
    const defaultLogo = document.getElementById("defaultLogo");

    logoFile.addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(event) {
          logoImg.src = event.target.result;
          logoImg.style.display = "block";
          defaultLogo.style.display = "none";
        };
        reader.readAsDataURL(file);
      }
    });

    function fakeSend() {
      const mail = document.getElementById("mail").value;
      const log = document.getElementById("log");

      if (!mail) {
        log.innerText = ">> signal absent";
        return;
      }

      log.innerText = ">> verifying node...";
      
      setTimeout(() => {
        log.innerText = ">> connection unstable";
      }, 1200);

      setTimeout(() => {
        log.innerText = ">> " + mail + " registered in Mnemosyne archive";
      }, 2500);

      setTimeout(() => {
        log.innerText += "\n>> awaiting next instruction...";
      }, 3800);
    }
  </script>
</body>
</html>
