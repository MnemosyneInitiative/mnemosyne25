<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mnemosyne Initiative</title>

  <style>
    body {
      margin: 0;
      background: #000000;
      color: #c9d1d9;
      font-family: "Courier New", monospace;
      overflow: hidden;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 25px;
    }

    h1 {
      letter-spacing: 0px;
      font-size: 1.8rem;
      color: #ffffff;
      margin-top: 0;
    }

    .subtitle {
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .terminal {
      border: 1px solid #2a2a2a;
      padding: 20px;
      width: 320px;
      background: rgba(0,0,0,0);
    }

    input {
      width: 100%;
      padding: 10px;
      background: black;
      border: 1px solid #333;
      color: #ffffff;
      outline: none;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #121212;
      border: 1px solid #2a2a2a;
      color: #ffffff;
      cursor: pointer;
      box-sizing: border-box;
    }

    button:hover {
      background: #111;
    }

    .log {
      margin-top: 15px;
      font-size: 0.85rem;
      opacity: 0.8;
      min-height: 40px;
      color: #ffffff;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>MNEMOSYNE INITIATIVE</h1>

    <div class="terminal">
      <input id="mail" type="text" placeholder="enter contact ..." />
      <button onclick="fakeSend()">TRANSMIT</button>
      <div class="log" id="log"></div>
    </div>
  </div>

  <script>
    function fakeSend() {
      const mail = document.getElementById("mail").value;
      const log = document.getElementById("log");

      if (!mail) {
        log.innerText = ">> signal absent";
        return;
      }

      log.innerText = ">> verifying node...";
      
      setTimeout(() => {
        log.innerText = ">> connection unstable";
      }, 1200);

      setTimeout(() => {
        log.innerText = ">> " + mail + " registered in Mnemosyne archive";
      }, 2500);

      setTimeout(() => {
        log.innerText += "\n>> awaiting next instruction...";
      }, 3800);
    }
  </script>
</body>
</html>
